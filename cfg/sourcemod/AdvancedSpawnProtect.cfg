// Advanced Spawn Protection v4.4.1
// ConVars for plugin "AdvancedSpawnProtect.smx"

// Seconds of spawn protection after a player spawns.
// Default: "12"
sm_spawnprotect_time "12"

// Allow spawn protection while a player is controlling a bot.
// Default: "0"
sm_spawnprotect_botcontrol "0"

// Print chat messages when spawn protection starts or ends.
// Default: "1"
sm_spawnprotect_notifystart "1"

// End spawn protection when the protected player fires.
// Default: "1"
sm_spawnprotect_endonattack "1"

// Use FFA model colors instead of separate team colors.
// Default: "1"
sm_spawnprotect_ffamode "1"

// Color player models based on their protection state.
// Keep disabled so the red HUD warning does not coincide with red player models.
// Default: "0"
sm_spawnprotect_colormodels "0"

// Deprecated compatibility setting. The HUD uses configurable fixed colors.
// Default: "0"
sm_spawnprotect_rainbowhud "0"

// Draw a dark shadow behind the spawn protection HUD.
// Default: "1"
sm_spawnprotect_hud_shadow "1"

// Seconds each countdown HUD update remains visible.
// Keep this above 1.0 to prevent a gap between one-second updates.
// Default: "1.25"
sm_spawnprotect_hud_holdtime "1.25"

// Seconds remaining when the HUD changes to its warning color.
// Set to 0 to disable the warning color and warning fade.
// Default: "3"
sm_spawnprotect_hud_warning_time "3"

// Fade-out time for countdown updates while the warning color is active.
// Default: "0.25"
sm_spawnprotect_hud_warning_fadeout "0.25"

// Seconds the "Spawn Protection is now off" notice remains visible.
// Default: "2.5"
sm_spawnprotect_hud_end_holdtime "2.5"

// Fade-out time for the protection-ended notice.
// Default: "0.75"
sm_spawnprotect_hud_end_fadeout "0.75"

// Normal HUD color: light blue (235, 248, 255).
sm_spawnprotect_hud_color_red "235"
sm_spawnprotect_hud_color_green "248"
sm_spawnprotect_hud_color_blue "255"

// Warning and ending HUD color: light red (255, 120, 110).
sm_spawnprotect_hud_warning_red "255"
sm_spawnprotect_hud_warning_green "120"
sm_spawnprotect_hud_warning_blue "110"
